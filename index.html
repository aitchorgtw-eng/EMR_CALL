<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>醫院緊急召回系統</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="app" class="max-w-md mx-auto p-4">
        <header class="bg-white rounded-xl shadow-md p-4 mb-6">
            <h1 class="text-xl font-bold text-red-600 mb-2 text-center">緊急召回現況統計</h1>
            <p class="text-xs text-gray-400 text-center mb-4">最後更新：{{ lastUpdate }}</p>
            
            <div class="grid grid-cols-2 gap-2 text-sm">
                <div v-for="(count, loc) in statistics" :key="loc" class="bg-slate-100 p-2 rounded border-l-4 border-blue-500">
                    <span class="text-gray-600">{{ loc }}</span>
                    <div class="text-lg font-bold">{{ count }} 人</div>
                </div>
            </div>
        </header>

        <div class="bg-white rounded-xl shadow-md p-5 mb-6">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">姓名</label>
                    <input v-model="form.name" type="text" class="w-full border rounded-lg p-2 mt-1 focus:ring-2 focus:ring-blue-400 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">員工編號 (輸入999可下載)</label>
                    <input v-model="form.empID" type="text" class="w-full border rounded-lg p-2 mt-1 focus:ring-2 focus:ring-blue-400 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">目前去處</label>
                    <select v-model="form.location" class="w-full border rounded-lg p-2 mt-1 bg-white">
                        <option v-for="opt in locationOptions" :value="opt">{{ opt }}</option>
                    </select>
                </div>
                
                <button v-if="form.empID !== '999'" @click="submitData" :disabled="loading"
                    class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 disabled:bg-gray-400 transition">
                    {{ loading ? '傳送中...' : '確認報到 / 修改動向' }}
                </button>

                <button v-else @click="downloadCSV" 
                    class="w-full bg-black text-white font-bold py-3 rounded-lg animate-pulse">
                    下載完整名冊 (CSV)
                </button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-800 text-white">
                    <tr>
                        <th class="p-3">姓名</th>
                        <th class="p-3">去處</th>
                        <th class="p-3 text-right">時間</th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-for="person in members" :key="person.empID" class="border-b">
                        <td class="p-3 font-medium">{{ person.name }}</td>
                        <td class="p-3">
                            <span :class="getStatusClass(person.location)">{{ person.location }}</span>
                        </td>
                        <td class="p-3 text-right text-xs text-gray-400">{{ formatTime(person.time) }}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbyr2tOllkHS-72oF1X9ax2_437F1a42tq7JWms-jAxGW1_BKZ3hRikNttsq0qOtAC8NzQ/exec'; // 此處填入下方步驟申請的網址
                const loading = ref(false);
                const lastUpdate = ref(new Date().toLocaleString());
                const form = ref({ name: '', empID: '', location: '報到待命' });
                const members = ref([]); // 格式: { name, empID, location, time }
                
                const locationOptions = ['報到待命', '去1現場', '去2現場', '疏散區', '已完成離開'];

                // 統計數據計算
                const statistics = computed(() => {
                    const stats = {};
                    locationOptions.forEach(loc => stats[loc] = 0);
                    members.value.forEach(m => {
                        if (stats[m.location] !== undefined) stats[m.location]++;
                    });
                    return stats;
                });

                // 取得資料
                const fetchData = async () => {
                    try {
                        const res = await fetch(GOOGLE_URL);
                        const data = await res.json();
                        members.value = data;
                        lastUpdate.value = new Date().toLocaleString();
                    } catch (e) { console.error("獲取資料失敗"); }
                };

                // 提交資料
const submitData = async () => {
    if (!form.value.name || !form.value.empID) return alert('請輸入完整資訊');
    loading.value = true;
    try {
        await fetch(GOOGLE_URL, {
            method: 'POST',
            mode: 'no-cors', // 必須維持 no-cors
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(form.value)
        });
        
        // 由於 no-cors 無法得知是否成功，我們樂觀處理
        alert('資料已傳送，請稍候片刻查看列表更新');
        form.value.name = '';
        form.value.empID = '';
        
        // 延遲 2 秒後重新抓取，給予 Google 寫入時間
        setTimeout(() => {
            fetchData();
        }, 2000);
        
    } catch (e) {
        alert('系統連線異常');
    } finally {
        loading.value = false;
    }
};

                // 下載 CSV (999功能)
                const downloadCSV = () => {
                    let csvContent = "\uFEFF姓名,員工編號,去處,更新時間\n";
                    members.value.forEach(m => {
                        csvContent += `${m.name},${m.empID},${m.location},${m.time}\n`;
                    });
                    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(blob);
                    link.download = `緊急召回名單_${new Date().toLocaleDateString()}.csv`;
                    link.click();
                };

                const getStatusClass = (loc) => {
                    const base = "px-2 py-1 rounded-full text-xs font-bold ";
                    if (loc === '報到待命') return base + "bg-yellow-100 text-yellow-700";
                    if (loc.includes('現場')) return base + "bg-red-100 text-red-700";
                    if (loc === '已完成離開') return base + "bg-gray-100 text-gray-500";
                    return base + "bg-green-100 text-green-700";
                };

                const formatTime = (timeStr) => {
                    if (!timeStr) return '';
                    const date = new Date(timeStr);
                    return `${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}`;
                };

                onMounted(fetchData);

                return { form, members, locationOptions, statistics, lastUpdate, loading, submitData, downloadCSV, getStatusClass, formatTime };
            }
        }).mount('#app');
    </script>
</body>
</html>
